version: "3.8"

services:
  hermes-studio:
    image: ghcr.io/mscorpiolee/hermes-studio:latest
    container_name: hermes-studio
    ports:
      - "${TRIM_SERVICE_PORT:-6060}:6060"
      - "${HERMES_STUDIO_PREVIEW_FRONTEND_PORT:-8651}:8651"
      - "${HERMES_STUDIO_XAI_OAUTH_PORT:-56121}:56121"
    volumes:
      - ${TRIM_PKGVAR:?}/hermes:/home/agent/.hermes
      - ${TRIM_PKGVAR:?}/hermes-web-ui:/home/agent/.hermes-web-ui
    environment:
      - PORT=6060
      - BIND_HOST=0.0.0.0
      - HERMES_HOME=/home/agent/.hermes
      - HERMES_WEB_UI_HOME=/home/agent/.hermes-web-ui
      - HERMES_BIN=/opt/hermes/.venv/bin/hermes
      - HERMES_WEB_UI_MANAGED_GATEWAY=1
      - HERMES_WEB_UI_XAI_CALLBACK_BIND_HOST=0.0.0.0
      - HERMES_WEB_UI_GEMINI_CALLBACK_BIND_HOST=0.0.0.0
      - HERMES_ALLOW_ROOT_GATEWAY=1
      - PATH=/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - TZ=Asia/Shanghai
    restart: unless-stopped
    stdin_open: true
    tty: true
