name: Build Native fnOS Package

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fnos-package.yml"
      - "package.json"
      - "package-lock.json"
      - "bin/**"
      - "fnos/**"
      - "packages/**"
      - "scripts/build-fnos-fpk.mjs"
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "hermes-agent version to bundle"
        required: false
        default: "0.17.0"
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: fnos-package-${{ github.event.release.tag_name || github.event.inputs.hermes_version || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild node-pty

      - name: Prepare bundled Hermes runtime
        env:
          TARGET_OS: linux
          TARGET_ARCH: x64
          HERMES_VERSION: ${{ github.event.inputs.hermes_version || '0.17.0' }}
          HERMES_DESKTOP_NODE_VERSION: 24.15.0
          HERMES_SKIP_BROWSER_RUNTIME: "1"
        run: |
          npm ci --prefix packages/desktop --no-audit --no-fund
          npm --prefix packages/desktop run prepare:runtime

      - name: Download fnpack
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64 -o /tmp/fnpack
          chmod +x /tmp/fnpack
          /tmp/fnpack --help

      - name: Build native fnOS package
        env:
          FNPACK_BIN: /tmp/fnpack
          FNOS_TARGET_OS: linux
          FNOS_TARGET_ARCH: x64
        run: npm run build:fnos

      - name: Upload fnOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-studio-fnos
          path: dist/fnos/hermes-studio.fpk
          if-no-files-found: error

      - name: Upload fnOS package to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          make_latest: false
          fail_on_unmatched_files: true
          files: dist/fnos/hermes-studio.fpk
