name: Build Native fnOS Package

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fnos-package.yml"
      - "package.json"
      - "package-lock.json"
      - "bin/**"
      - "fnos/**"
      - "packages/**"
      - "scripts/build-fnos-fpk.mjs"
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "hermes-agent version to bundle"
        required: false
        default: "0.17.0"

permissions:
  contents: write

concurrency:
  group: fnos-package-${{ github.event.inputs.hermes_version || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm rebuild node-pty

      - name: Prepare bundled Hermes runtime
        env:
          TARGET_OS: linux
          TARGET_ARCH: x64
          HERMES_VERSION: ${{ github.event.inputs.hermes_version || '0.17.0' }}
          HERMES_DESKTOP_NODE_VERSION: 24.15.0
          HERMES_SKIP_BROWSER_RUNTIME: "1"
        run: |
          npm ci --prefix packages/desktop --no-audit --no-fund
          npm --prefix packages/desktop run prepare:runtime

      - name: Download fnpack
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64 -o /tmp/fnpack
          chmod +x /tmp/fnpack
          /tmp/fnpack --help

      - name: Build native fnOS package
        env:
          FNPACK_BIN: /tmp/fnpack
          FNOS_TARGET_OS: linux
          FNOS_TARGET_ARCH: x64
          HERMES_VERSION: ${{ github.event.inputs.hermes_version || '0.17.0' }}
          HERMES_DESKTOP_NODE_VERSION: 24.15.0
          HERMES_DESKTOP_PYTHON_VERSION: "3.12"
        run: npm run build:fnos

      - name: Create fnOS release metadata
        id: package_meta
        env:
          HERMES_VERSION: ${{ github.event.inputs.hermes_version || '0.17.0' }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          release_tag="fnos-v${version}"
          download_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/hermes-studio.fpk"
          cat > dist/fnos/hermes-studio.latest.json <<JSON
          {
            "appname": "hermes-studio",
            "display_name": "Hermes Studio",
            "version": "${version}",
            "fpk_version": "${version}",
            "release_tag": "${release_tag}",
            "download_url": "${download_url}",
            "source_repo": "https://github.com/EKKOLearnAI/hermes-studio",
            "packaging_repo": "https://github.com/${GITHUB_REPOSITORY}",
            "platforms": ["x86"],
            "app_type": "native",
            "update_source": "fnos-native",
            "service_port": 6060,
            "gateway_prefix": "/app/hermes-studio",
            "gateway_socket": "hermes-studio.sock",
            "fnos_min_version": "1.1.3100",
            "bundled_runtime": {
              "node": "24.15.0",
              "python": "3.12",
              "hermes_agent": "${HERMES_VERSION}"
            },
            "built_from": "${GITHUB_SHA}",
            "updated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSON
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Upload fnOS package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-studio-fnos
          path: |
            dist/fnos/hermes-studio.fpk
            dist/fnos/hermes-studio.latest.json
          if-no-files-found: error

      - name: Publish fnOS package release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package_meta.outputs.release_tag }}
          VERSION: ${{ steps.package_meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Native fnOS package for Hermes Studio ${VERSION}.

          - App source: https://github.com/EKKOLearnAI/hermes-studio
          - Packaging source: https://github.com/${GITHUB_REPOSITORY}
          - Build run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - Commit: ${GITHUB_SHA}
          EOF

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "Hermes Studio fnOS ${VERSION}" \
              --notes-file "$notes_file"
          else
            if ! git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
              git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
              git push origin "refs/tags/${RELEASE_TAG}"
            fi
            gh release create "${RELEASE_TAG}" \
              --title "Hermes Studio fnOS ${VERSION}" \
              --notes-file "$notes_file"
          fi

          gh release upload "${RELEASE_TAG}" \
            dist/fnos/hermes-studio.fpk \
            dist/fnos/hermes-studio.latest.json \
            --clobber
